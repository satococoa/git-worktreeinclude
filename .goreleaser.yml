# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: git-worktreeinclude

builds:
  - id: git-worktreeinclude
    binary: git-worktreeinclude
    main: ./cmd/git-worktreeinclude
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: satococoa
    name: git-worktreeinclude
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
